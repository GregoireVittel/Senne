name: Update Vigicrues data

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Fetch latest Vigicrues data
        run: python scripts/update_vigicrues_data.py
      - name: Commit data if changed
        run: |
          if git diff --quiet -- data.json; then
            echo "data.json unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "Update Vigicrues data"
          git push
